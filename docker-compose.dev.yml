name: vedanta-systems-dev

services:
  frontend:
    container_name: vedanta-systems-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        VITE_GITHUB_TOKEN: ${VITE_GITHUB_TOKEN}
    # Dev uses 4100, prod uses 3100 (both on same machine)
    ports:
      - "4100:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
      - VITE_ENVIRONMENT=development
      - VITE_GITHUB_TOKEN=${VITE_GITHUB_TOKEN}
      # Use localhost for browser access (frontend runs in browser, not in container)
      # Use relative URLs so dev works from any device (Tailscale, phone, etc.)
      # Vite proxy handles /api -> api:3001
      #- VITE_FOOTY_API_URL=http://localhost:4101/api/found-footy
      #- VITE_SPIN_CYCLE_API_URL=http://localhost:4101/api/spin-cycle
    restart: unless-stopped
    # Enable volumes for live development (Dev Containers)
    volumes:
      - .:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/vedanta/.ssh:/root/.ssh:ro
      - /home/vedanta/photos:/app/public/photos:ro  # Shared photos (read-only)
    command: npm run dev -- --host 0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"  # For reaching host-network services (btop)
    networks:
      - vedanta-systems-dev
      - luv-dev
    depends_on:
      - api

  # API server handles all project APIs (/api/found-footy/*, /api/btop/*, etc.)
  api:
    container_name: vedanta-systems-dev-api
    image: node:18-alpine
    working_dir: /app
    ports:
      - "4101:3001"
    environment:
      - API_PORT=3001
      - NODE_ENV=development
      # Spin Cycle PostgreSQL
      - SPIN_CYCLE_POSTGRES_URI=postgresql://${SPIN_CYCLE_POSTGRES_USER}:${SPIN_CYCLE_POSTGRES_PASS}@spin-cycle-dev-postgres:5432/spincycle
      # btop proxy target (runs on host network)
      - BTOP_HOST=host.docker.internal
      # MongoDB
      - MONGODB_URI=mongodb://${FOUND_FOOTY_MONGO_USER}:${FOUND_FOOTY_MONGO_PASS}@found-footy-dev-mongo:27017/found_footy?authSource=admin
      # MinIO
      - MINIO_ENDPOINT=found-footy-dev-minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${FOUND_FOOTY_S3_USER}
      - MINIO_SECRET_KEY=${FOUND_FOOTY_S3_PASS}
    volumes:
      - .:/app
    command: sh -c "npm install && npx tsx watch src/server/index.ts"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"  # For reaching btop on host network
    networks:
      - vedanta-systems-dev
      - luv-dev

  # btop system monitor - luv node (local)
  btop-luv:
    container_name: vedanta-systems-dev-btop-luv
    hostname: luv
    build:
      context: ./btop
      dockerfile: Dockerfile
    restart: unless-stopped
    
    # Required for FULL host system visibility
    pid: host                    # See host processes
    network_mode: host           # See host network traffic (required for accurate net stats)
    privileged: true             # Required for GPU access and full /proc visibility
    
    volumes:
      # Host system info - mounted at original paths so btop works unchanged
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /:/hostfs:ro                    # Host root filesystem for disk stats
      - /run/media:/run/media:ro        # Mounted drives (if any)
      
      # GPU access for AMD ROCm
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    environment:
      - WRAPPER_PORT=4102        # Dev: 4102, Prod: 3102 (binds to host with network_mode: host)
      - BTOP_HOST=local          # "local" or "user@host" for SSH to remote
      - TZ=UTC
    
    # No ports needed - network_mode: host means it binds directly to host ports
    
    # Ensure GPU is accessible
    devices:
      - /dev/dri:/dev/dri
    
    # AMD GPU specific - use GIDs since groups don't exist in container
    group_add:
      - "44"   # video
      - "992"  # render
    
    # No networks - network_mode: host is incompatible with docker networks

  # btop system monitor for joi node
  btop-joi:
    container_name: vedanta-systems-dev-btop-joi
    hostname: joi
    build:
      context: ./btop
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host

    volumes:
      - /run/user/1000/keyring/ssh:/ssh-agent:ro

    environment:
      - WRAPPER_PORT=4103
      - BTOP_HOST=${BTOP_JOI_SSH_HOST}
      - SSH_AUTH_SOCK=/ssh-agent

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4103/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  # Internal network for vedanta-systems DEV services
  vedanta-systems-dev:
    name: vedanta-systems-dev
    driver: bridge
  
  # Shared network - persistent, cross-project communication
  # Only join this if you need to talk to OTHER projects
  luv-dev:
    name: luv-dev
    external: true

